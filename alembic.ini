# Alembic configuration for EncarreraOK
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the alembic scripts directory
script_location = alembic

# Prepend sys.path with '.' so that local modules are importable
prepend_sys_path = .

# Database URL is read from the DATABASE_URL environment variable at runtime.
# Do NOT hardcode credentials here.
# The env.py handles the actual URL construction from environment variables.
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
